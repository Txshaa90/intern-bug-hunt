<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 03 - Checkout Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <form id="checkoutForm" class="form-card">
      <h1>Checkout</h1>

      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" placeholder="Jamie Cruz">

      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="jamie@email.com">

      <label for="address">Shipping Address</label>
      <textarea id="address" rows="4" placeholder="Street, city, province"></textarea>

      <button type="submit">Place Order</button>
      <p id="message" class="message"></p>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
